<script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Cairo', sans-serif; }
    .glow { box-shadow: 0 0 40px rgba(52, 152, 219, 0.4); }
    
    .phone-input {
      direction: ltr !important;
      text-align: left !important;
      padding-left: 1rem !important;
    }
  </style>

<body class="min-h-screen bg-gradient-to-br from-[#1a3a5f] via-[#0f2033] to-[#1a3a5f] flex items-center justify-center p-4">
  <div class="max-w-lg w-full bg-white/10 backdrop-blur-xl rounded-3xl p-8 glow border border-white/20">
    
    <div class="text-center mb-8">
      <div class="mx-auto w-24 h-24 bg-blue-500/20 rounded-full flex items-center justify-center glow mb-4">
        <span class="text-5xl">🏗️</span>
      </div>
      <h1 class="text-4xl font-black text-white mb-2 tracking-wider">حفارات السعودية</h1>
      <p class="text-xl text-blue-300 font-bold">لديك حفارة أو دقاقة آبار؟</p>
      <p class="text-lg text-white/80 mt-2">سجّل الآن لتصلك طلبات حفر الآبار في منطقتك</p>
    </div>

    <form id="rigForm" class="space-y-6">
      
      <div>
        <label class="block text-white/70 text-sm mb-2 mr-2">الاسم الكامل (اختياري)</label>
        <input type="text" id="name" placeholder="Full Name (Optional)" 
               class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-white/30 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-white/70 text-sm mb-2 mr-2">رقم الجوال السعودي *</label>
        <input type="tel" id="phone" placeholder="501234567" required pattern="[0-9]{9,10}" maxlength="10"
               class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-white/50 border border-white/30 focus:outline-none focus:ring-2 focus:ring-blue-400 phone-input">
        <p class="text-xs text-white/50 mt-2 text-center">مثال: 0501234567</p>
      </div>

      <button type="submit" id="submitBtn"
              class="w-full py-5 bg-gradient-to-r from-blue-600 to-cyan-600 text-white text-xl font-bold rounded-2xl shadow-xl hover:shadow-blue-500/50 transition-all duration-300 flex items-center justify-center gap-3">
        <span>انضم للمنصة الآن</span>
        <span class="text-2xl">⚡</span>
      </button>
    </form>

    <div class="text-center mt-10 text-white/70">
      <p class="text-2xl font-bold">سجّل معنا أكثر من <span class="text-blue-400">450</span> صاحب معدة</p>
    </div>
  </div>

  <script>
    document.getElementById('rigForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = 'جاري التسجيل...';

      let phoneInput = document.getElementById('phone').value.trim();
      phoneInput = phoneInput.replace(/[\s\-\+]/g, '');

      if (!/^[05][0-9]{8,9}$/.test(phoneInput)) {
        alert('يرجى إدخال رقم جوال صحيح');
        btn.disabled = false;
        btn.innerHTML = '<span>انضم للمنصة الآن</span><span class="text-2xl">⚡</span>';
        return;
      }

      let cleanPhone = phoneInput.startsWith('0') ? phoneInput.substring(1) : phoneInput;
      cleanPhone = '+966' + cleanPhone;

      const formData = {
        name: document.getElementById('name').value.trim() || "غير مسجل",
        phone: cleanPhone,
        category: "Well Drilling / حفارات آبار"
      };

      try {
        const res = await fetch('https://revwa.cloud/webhook/well-rig-registration', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (res.ok) {
          // تتبع التحويل قبل التوجيه
          if(typeof fbq !== 'undefined') fbq('track', 'CompleteRegistration');
          if(typeof ttq !== 'undefined') ttq.track('CompleteRegistration');
          
          // التوجيه لصفحة الشكر (تأكد أن الملف اسمه thank-you.html)
          window.location.href = '/thank-you.html?phone=' + encodeURIComponent(cleanPhone);
        } else {
          alert('حدث خطأ، حاول مرة أخرى');
          btn.disabled = false;
          btn.innerHTML = '<span>انضم للمنصة الآن</span><span class="text-2xl">⚡</span>';
        }
      } catch (err) {
        alert('خطأ في الاتصال بالسيرفر');
        btn.disabled = false;
        btn.innerHTML = '<span>انضم للمنصة الآن</span><span class="text-2xl">⚡</span>';
      }
    };
  </script>
</body>
</html>
